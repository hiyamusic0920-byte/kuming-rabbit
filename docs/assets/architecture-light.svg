<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 840" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a5a5a"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0,0 L10,5 L0,10 z" fill="#C62828"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0,0 L10,5 L0,10 z" fill="#1565C0"/>
    </marker>
  </defs>
  <style>
    .t{fill:#1a1a1a}.sub{fill:#6a6a6a}.wht{fill:#1a1a1a}
    .h{font-weight:700}.lbl{fill:#5a5a5a;font-style:italic}
    .band{fill:#9a9a9a;font-weight:700;letter-spacing:2px}
  </style>

  <rect width="1280" height="840" fill="#ffffff"/>
  <text x="40" y="44" font-size="26" class="t h">OwlNest QA Automation</text>
  <text x="40" y="66" font-size="14" class="sub">An AI-agent-collaborative QA knowledge system — agents are swappable, the repo is the source of truth.</text>

  <!-- ===================== GOVERNANCE (right vertical column) ===================== -->
  <rect x="1028" y="92" width="220" height="700" rx="14" fill="#FFF5F5" stroke="#C62828" stroke-width="2.5" stroke-dasharray="2 0"/>
  <text x="1138" y="120" font-size="13" text-anchor="middle" class="band" fill="#C62828">🛡 GOVERNANCE</text>
  <text x="1138" y="142" font-size="11" text-anchor="middle" class="lbl">Agent 可換 · repo 不可變</text>
  <g font-size="13" text-anchor="middle">
    <rect x="1048" y="166" width="180" height="58" rx="9" fill="#fff" stroke="#C62828" stroke-width="1.5"/>
    <text x="1138" y="190" class="t h">PROJECT_RULES</text><text x="1138" y="210" font-size="11" class="sub">11 步硬規則</text>
    <rect x="1048" y="244" width="180" height="58" rx="9" fill="#fff" stroke="#C62828" stroke-width="1.5"/>
    <text x="1138" y="268" class="t h">AGENT_GOVERNANCE</text><text x="1138" y="288" font-size="11" class="sub">防 Agent 漂移</text>
    <rect x="1048" y="322" width="180" height="58" rx="9" fill="#fff" stroke="#C62828" stroke-width="1.5"/>
    <text x="1138" y="346" class="t h">Permission</text><text x="1138" y="366" font-size="11" class="sub">權限把關 · Sunny 決定</text>
    <rect x="1048" y="400" width="180" height="58" rx="9" fill="#fff" stroke="#C62828" stroke-width="1.5"/>
    <text x="1138" y="424" class="t h">CONSENSUS</text><text x="1138" y="444" font-size="11" class="sub">決策可追蹤</text>
  </g>

  <!-- ===================== HUMAN ===================== -->
  <text x="40" y="108" font-size="12" class="band">① HUMAN</text>
  <rect x="350" y="118" width="320" height="74" rx="37" fill="#FFD54F" stroke="#F57F17" stroke-width="3"/>
  <text x="510" y="150" font-size="20" text-anchor="middle" class="wht h">👤  Sunny · QA-PM</text>
  <text x="510" y="174" font-size="12" text-anchor="middle" fill="#7a5a00">方向決策 · 高風險審閱 · 跨 Agent 仲裁</text>

  <rect x="760" y="124" width="220" height="62" rx="12" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="870" y="150" font-size="14" text-anchor="middle" class="t h">業務 / 稽核方</text>
  <text x="870" y="170" font-size="11" text-anchor="middle" class="sub">KPMG 報告消費者</text>

  <!-- ===================== AGENTS ===================== -->
  <text x="40" y="232" font-size="12" class="band">② AI AGENT 協作層</text>
  <rect x="90" y="248" width="300" height="80" rx="14" fill="#FF9800" stroke="#E65100" stroke-width="3"/>
  <text x="240" y="282" font-size="18" text-anchor="middle" class="wht h">⭐ Claude Code</text>
  <text x="240" y="306" font-size="12" text-anchor="middle" fill="#5a2d00">預設 Lead · 可呼叫 Codex</text>

  <rect x="560" y="248" width="300" height="80" rx="14" fill="#FFE0B2" stroke="#E65100" stroke-width="2.5"/>
  <text x="710" y="282" font-size="18" text-anchor="middle" class="t h">Codex</text>
  <text x="710" y="306" font-size="12" text-anchor="middle" fill="#8a4a00">對等執行 · 挑戰 / 對案</text>

  <rect x="90" y="338" width="160" height="34" rx="10" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="170" y="360" font-size="12" text-anchor="middle" class="sub">Gemini CLI · 分流 quota</text>

  <!-- Claude <-> Codex dialogue -->
  <line x1="392" y1="280" x2="558" y2="280" stroke="#E65100" stroke-width="2.5" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="475" y="272" font-size="11" text-anchor="middle" fill="#E65100" class="h">propose ⇄ challenge ⇄ converge</text>

  <!-- ===================== WORKFLOW ===================== -->
  <text x="40" y="406" font-size="12" class="band">③ QA WORKFLOW — 11 步主線</text>
  <rect x="90" y="418" width="900" height="58" rx="12" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="2"/>
  <g font-size="13" text-anchor="middle" class="t">
    <text x="220" y="453" class="h" fill="#6A1B9A">採集 → Plan → TC → Feature</text>
    <text x="540" y="453" font-size="16" fill="#9a9a9a">›</text>
    <text x="620" y="453" class="h" fill="#6A1B9A">Explore → POM → BDD</text>
    <text x="800" y="453" font-size="16" fill="#9a9a9a">›</text>
    <text x="895" y="453" class="h" fill="#6A1B9A">pytest → Report → Worklog</text>
  </g>

  <!-- ===================== KNOWLEDGE ===================== -->
  <text x="40" y="510" font-size="12" class="band">④ KNOWLEDGE LAYER — 單一真理來源</text>
  <rect x="84" y="520" width="912" height="86" rx="12" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <g text-anchor="middle">
    <text x="200" y="552" font-size="14" class="t h" fill="#1565C0">docs/product</text><text x="200" y="574" font-size="11" class="sub">商業規則 · 狀態流</text>
    <text x="425" y="552" font-size="14" class="t h" fill="#1565C0">pages/_registry</text><text x="425" y="574" font-size="11" class="sub">selector · UI 陷阱</text>
    <text x="650" y="552" font-size="14" class="t h" fill="#1565C0">seeds</text><text x="650" y="574" font-size="11" class="sub">測資策略 · API</text>
    <text x="875" y="552" font-size="14" class="t h" fill="#1565C0">worklog · MOC</text><text x="875" y="574" font-size="11" class="sub">紀錄 · 導航</text>
  </g>
  <text x="540" y="596" font-size="11" text-anchor="middle" class="lbl">qa-thought-capture 即時回補 ↑　　test plan 前深讀 ↓</text>

  <!-- ===================== EVIDENCE -> REPORT ===================== -->
  <text x="40" y="644" font-size="12" class="band">⑤ EVIDENCE → REPORT</text>
  <rect x="90" y="656" width="240" height="74" rx="12" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="210" y="688" font-size="15" text-anchor="middle" class="t h">🧾 JSON 合約</text>
  <text x="210" y="710" font-size="11" text-anchor="middle" class="sub">reports/data · schema upsert</text>

  <rect x="430" y="648" width="270" height="90" rx="14" fill="#E1BEE7" stroke="#4A148C" stroke-width="3"/>
  <text x="565" y="682" font-size="16" text-anchor="middle" class="t h" fill="#4A148C">📌 Evidence Board</text>
  <text x="565" y="704" font-size="11" text-anchor="middle" fill="#5e2a82">sprint ↔ ticket 對應</text>
  <text x="565" y="722" font-size="11" text-anchor="middle" fill="#5e2a82">決定 PDF 交付落點</text>

  <rect x="780" y="656" width="210" height="74" rx="12" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2.5"/>
  <text x="885" y="686" font-size="15" text-anchor="middle" class="t h">📄 QA / UAT PDF</text>
  <text x="885" y="708" font-size="11" text-anchor="middle" class="sub">KPMG 稽核標準</text>

  <!-- ============ FLOWS ============ -->
  <!-- Sunny -> Agents -->
  <line x1="450" y1="194" x2="280" y2="246" stroke="#5a5a5a" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="320" y="226" font-size="11" fill="#5a5a5a" class="h">下票 / 指令</text>
  <!-- Sunny -> Governance (route below reviewer box) -->
  <path d="M670,178 C720,200 990,210 1026,232" fill="none" stroke="#C62828" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="820" y="222" font-size="11" fill="#C62828" class="h">最終決定權</text>
  <!-- Governance -.constraint.-> Agents -->
  <line x1="1046" y1="290" x2="864" y2="290" stroke="#C62828" stroke-width="1.8" stroke-dasharray="6 5" marker-end="url(#arrG)"/>
  <text x="955" y="282" font-size="11" fill="#C62828">約束</text>
  <!-- Agents -> Workflow -->
  <line x1="240" y1="372" x2="240" y2="416" stroke="#5a5a5a" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="252" y="398" font-size="11" fill="#5a5a5a">遵循</text>
  <!-- Knowledge <-> Agents (feed up) -->
  <line x1="700" y1="520" x2="700" y2="332" stroke="#1565C0" stroke-width="1.8" marker-start="url(#arrB)" marker-end="url(#arrB)"/>
  <text x="712" y="430" font-size="11" fill="#1565C0">餵養 ⇅ 回補</text>
  <!-- Workflow -> JSON -->
  <line x1="200" y1="478" x2="200" y2="654" stroke="#5a5a5a" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="212" y="620" font-size="11" fill="#5a5a5a">產測試證據</text>
  <!-- JSON -> PDF (via render) -->
  <line x1="332" y1="693" x2="778" y2="693" stroke="#5a5a5a" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="500" y="685" font-size="11" text-anchor="middle" fill="#5a5a5a">validate → render</text>
  <!-- Board -> PDF -->
  <line x1="702" y1="700" x2="778" y2="700" stroke="#4A148C" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Sunny -> Board (open) -->
  <line x1="540" y1="194" x2="555" y2="646" stroke="#4A148C" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#arr)"/>
  <text x="556" y="430" font-size="11" fill="#4A148C" transform="rotate(0)">開板 / 把關</text>
  <!-- PDF -> 業務/稽核方 (deliver, route up the open right gutter) -->
  <path d="M990,690 C1010,690 1010,400 1010,260 C1010,210 980,190 962,186" fill="none" stroke="#2E7D32" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="1018" y="470" font-size="11" fill="#2E7D32" class="h" transform="rotate(90 1018 470)">交付 PDF</text>
  <text x="40" y="824" font-size="11" class="lbl">實線 = 主資料流　·　藍線 = 知識餵養 / 回補　·　虛線 = 治理約束 / 把關</text>
</svg>
